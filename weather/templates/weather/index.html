<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weather PRO — Django</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #4158D0, #C850C0, #FFCC70);
            background-size: 400% 400%;
            animation: gradient 12s ease infinite;
            color: #fff;
        }

        @keyframes gradient {
            0% {background-position: 0% 50%;}
            50% {background-position: 100% 50%;}
            100% {background-position: 0% 50%;}
        }

        .card {
            width: 450px;
            padding: 35px;
            border-radius: 25px;
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(15px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }

        form input {
            width: 100%;
            padding: 12px 15px;
            border-radius: 12px;
            border: none;
            margin-bottom: 15px;
            font-size: 16px;
            outline: none;
        }

        form button {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            background: #fff;
            color: #333;
            transition: all 0.3s;
        }

        form button:hover {
            transform: scale(1.03);
            background: #f2f2f2;
        }

        .weather-icon {
            width: 100px;
            height: 100px;
            margin: 15px 0;
        }

        .temp {
            font-size: 48px;
            font-weight: 700;
        }

        .desc {
            font-size: 20px;
            text-transform: capitalize;
        }

        .details {
            margin-top: 10px;
            font-size: 16px;
        }

        .alert {
            background: rgba(255,50,50,0.65);
            padding: 10px;
            border-radius: 10px;
            margin-top: 15px;
        }

        @media (max-width: 480px) {
            .card {
                width: 90%;
                padding: 25px;
            }
        }

    </style>
</head>
<body>
<div class="card">
    <h1 style="margin-bottom:20px;">Ob-havo tekshiruvi PRO</h1>

    <form method="post">
      {% csrf_token %}
      <input type="text" name="city" placeholder="Shahar nomi (masalan: Tashkent)" required />
      <button type="submit"><i class="fa-solid fa-magnifying-glass"></i> Qidirish</button>
    </form>

    {% if error %}
        <div class="alert">{{ error }}</div>
    {% endif %}

    {% if weather %}
        <h2>{{ weather.city }}</h2>
        <img class="weather-icon" src="https://openweathermap.org/img/wn/{{ weather.icon }}@2x.png" alt="{{ weather.desc }}" />
        <div class="temp">{{ weather.temp }}°C</div>
        <div class="desc">{{ weather.desc }}</div>
        <div class="details">
            <p><strong>Namlik:</strong> {{ weather.humidity }}%</p>
            <p><strong>Shamol tezligi:</strong> {{ weather.wind }} m/s</p>
        </div>
    {% endif %}
</div>
</body>
</html>
